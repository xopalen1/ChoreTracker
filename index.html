<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Palantir</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Fraunces:opsz,wght@9..144,600&family=Patrick+Hand&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260422-1" />
  </head>
  <body>
    <div class="bg-glow bg-glow-1" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-2" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="app-header card">
        <div>
          <p class="eyebrow">(=^･ω･^=)</p>
          <h1>Povinnosti</h1>
          <p class="subtle">(=^･ω･^=)</p>
        </div>
        <div class="header-actions">
          <button id="newRoommateBtn" class="btn btn-ghost">Pridať spolubývajúceho</button>
          <button id="newChoreBtn" class="btn btn-primary">Pridať úlohu</button>
        </div>
      </header>

      <section class="card controls">
        <div class="control-group">
          <label for="filterStatus">Filter</label>
          <select id="filterStatus">
            <option value="all">Všetky</option>
            <option value="open">Nehotové</option>
            <option value="done">Hotové</option>
          </select>
        </div>

        <div class="control-group">
          <label for="searchInput">Hľadať</label>
          <input id="searchInput" type="search" placeholder="Hľadať úlohy alebo spolubyvajúceho" />
        </div>
      </section>

      <section>
        <ul id="choreList" class="chore-list" aria-live="polite"></ul>
      </section>
    </main>

    <aside id="chatPanel" class="chat-panel card" aria-label="(=^･ω･^=)" aria-hidden="true">
      <div id="chatResizer" class="chat-resizer" aria-hidden="true"></div>
      <header class="chat-header">
        <div>
          <p class="eyebrow">(=^･ω･^=)</p>
          <h2>Anonýmne recenzie a poznámky</h2>
        </div>
        <button id="chatCloseBtn" class="btn btn-ghost btn-small chat-close-btn" type="button" aria-label="Zatvoriť">
          Zavrieť
        </button>
      </header>

      <ul id="chatList" class="chat-list" aria-live="polite"></ul>

      <form id="chatForm" class="chat-form" autocomplete="off">
        <label for="chatInput">Yappuj</label>
        <div class="chat-compose">
          <input
            id="chatInput"
            name="message"
            type="text"
            maxlength="240"
            placeholder="Sem píš"
            required
          />
          <button type="submit" class="btn btn-primary">Prilepiť</button>
        </div>
      </form>
    </aside>

    <button
      id="chatToggleBtn"
      class="chat-toggle-btn"
      type="button"
      aria-controls="chatPanel"
      aria-expanded="false"
      aria-label="Poznámky"
    >
      Chat
    </button>

    <dialog id="choreDialog" class="dialog card">
      <form id="choreForm" class="modal-form" method="dialog">
        <h2>Pridať úlohu</h2>

        <label for="title">Názov</label>
        <input id="title" name="title" type="text" required maxlength="80" />

        <label for="assignee">Otrok</label>
        <select id="assignee" name="assignee" required>
          <option value="" selected disabled>Najprv pridaj spolubývajúcich</option>
        </select>

        <label for="dueDate">Deadline (DD-MM-YYYY)</label>
        <input
          id="dueDate"
          name="dueDate"
          type="text"
          inputmode="numeric"
          placeholder="DD-MM-YYYY"
          pattern="\d{2}-\d{2}-\d{4}"
          title="Použi DD-MM-YYYY, napr. 11-09-2001"
          required
        />

        <label for="autoReassign" class="auto-reassign-toggle">
          <input id="autoReassign" name="autoReassign" type="checkbox" />
          <span class="toggle-track" aria-hidden="true">
            <span class="toggle-thumb"></span>
          </span>
          <span class="toggle-text">Náhodne preradiť po dokončení (deadline bude o týždeň od dňa priradenia)</span>
        </label>

        <div class="dialog-actions">
          <button type="button" id="cancelBtn" class="btn btn-ghost">Zrušiť</button>
          <button type="submit" class="btn btn-primary">Uložiť úlohu</button>
        </div>
      </form>
    </dialog>

    <dialog id="roommateDialog" class="dialog card">
      <form id="roommateForm" class="modal-form" method="dialog">
        <h2>Pridať spolubývajúceho</h2>

        <label for="roommateName">Meno</label>
        <input id="roommateName" name="name" type="text" required maxlength="40" />

        <div class="dialog-actions">
          <button type="button" id="cancelRoommateBtn" class="btn btn-ghost">Zrušiť</button>
          <button type="submit" class="btn btn-primary">Uložiť</button>
        </div>
      </form>
    </dialog>

    <dialog id="editDueDateDialog" class="dialog card">
      <form id="editDueDateForm" class="modal-form" method="dialog">
        <h2>Upraviť deadline</h2>

        <label for="editDueDateInput">Deadline (DD-MM-YYYY)</label>
        <input
          id="editDueDateInput"
          name="dueDate"
          type="text"
          inputmode="numeric"
          placeholder="DD-MM-YYYY"
          pattern="\d{2}-\d{2}-\d{4}"
          title="Použi DD-MM-YYYY, napr. 11-09-2001"
          required
        />

        <div class="dialog-actions">
          <button type="button" id="cancelEditDueDateBtn" class="btn btn-ghost">Zrušiť</button>
          <button type="submit" class="btn btn-primary">Uložiť deadline</button>
        </div>
      </form>
    </dialog>

    <dialog id="deleteConfirmDialog" class="dialog card">
      <form id="deleteConfirmForm" class="modal-form" method="dialog">
        <h2>Potvrdiť vymazanie</h2>
        <p id="deleteConfirmText" class="subtle">Naozaj chceš vymazať túto úlohu?</p>
        <div class="dialog-actions">
          <button type="button" id="cancelDeleteBtn" class="btn btn-ghost">Zrušiť</button>
          <button type="submit" id="confirmDeleteBtn" class="btn btn-danger">Vymazať</button>
        </div>
      </form>
    </dialog>

    <template id="choreTemplate">
      <li class="card chore-item">
        <div class="chore-main">
          <h3 class="chore-title"></h3>
          <p class="chore-meta"></p>
        </div>
        <div class="chore-actions">
          <button class="btn btn-small btn-edit-date" type="button">Upraviť deadline</button>
          <button class="btn btn-small btn-toggle" type="button"></button>
          <button class="btn btn-small btn-danger btn-delete" type="button">Vymazať</button>
        </div>
      </li>
    </template>

    <script src="js/chores.js?v=20260422-1" defer></script>
    <script src="js/messages.js?v=20260422-1" defer></script>
    <script src="js/main.js?v=20260422-1" defer></script>
  </body>
</html>
